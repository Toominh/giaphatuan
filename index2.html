    // ── Home Screen ─────────────────────────────────────────────────────────────
    function HomeScreen({ onOpen }) {
      const [families, setFamilies] = useState(getFamiliesIndex);
      const [showCreate, setShowCreate] = useState(false);
      const [newName, setNewName] = useState('');
      const [creating, setCreating] = useState(false);

      const handleCreate = async () => {
        const name = newName.trim();
        if (!name) return;
        setCreating(true);
        const id = genId();
        // Nạp dữ liệu mẫu từ datamau.json nếu có
        try {
          const res = await fetch('./datamau.json', { cache: 'no-store' });
          if (res.ok) {
            const data = await res.json();
            // Hỗ trợ cả 2 định dạng: full export { tree, settings } hoặc bare tree
            const tree = data.tree || (data.id ? data : null);
            if (tree) localStorage.setItem(familyTreeKey(id), JSON.stringify(tree));
            if (data.settings) localStorage.setItem(familySettingsKey(id), JSON.stringify(data.settings));
            if (data.intro) localStorage.setItem(familyIntroKey(id), data.intro);
          }
        } catch { /* không có file mẫu thì thôi, App sẽ dùng SAMPLE mặc định */ }
        const entry = { id, name, createdAt: Date.now() };
        const next = [...families, entry];
        saveFamiliesIndex(next);
        setFamilies(next);
        setNewName('');
        setShowCreate(false);
        setCreating(false);
        onOpen(entry);
      };

      const handleDelete = (id, name) => {
        if (!window.confirm(`Xóa gia phả "${name}"? Dữ liệu sẽ mất vĩnh viễn.`)) return;
        localStorage.removeItem(familyTreeKey(id));
        localStorage.removeItem(familySettingsKey(id));
        localStorage.removeItem(familyIntroKey(id));
        const next = families.filter(f => f.id !== id);
        saveFamiliesIndex(next);
        setFamilies(next);
      };

      return (
        <div style={{ background: '#060e1c', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          {/* Header */}
          <div style={{ background: '#08121e', borderBottom: '1px solid #0e2040', padding: '14px 24px', display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 22 }}>🌳</span>
            <span style={{ color: '#6aaaf0', fontWeight: 700, fontSize: 18 }}>Quản Lý Gia Phả</span>
          </div>

          {/* Body */}
          <div style={{ flex: 1, padding: '32px 24px', maxWidth: 640, margin: '0 auto', width: '100%' }}>
            {families.length === 0 ? (
              <div style={{ textAlign: 'center', color: '#1e3858', marginTop: 80 }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>🌿</div>
                <div style={{ fontSize: 16, marginBottom: 8 }}>Chưa có gia phả nào</div>
                <div style={{ fontSize: 13 }}>Nhấn "Tạo gia phả mới" để bắt đầu</div>
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {families.map(f => {
                  // Count members
                  let memberCount = 0;
                  try { const t = JSON.parse(localStorage.getItem(familyTreeKey(f.id))); if (t) memberCount = countDesc(t) + 1; } catch {}
                  const date = new Date(f.createdAt).toLocaleDateString('vi-VN');
                  return (
                    <div key={f.id} style={{ background: '#09162a', border: '1px solid #152a4a', borderRadius: 10, padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer', transition: 'border-color 0.15s' }}
                      onClick={() => onOpen(f)}
                      onMouseEnter={e => e.currentTarget.style.borderColor = '#2a4a80'}
                      onMouseLeave={e => e.currentTarget.style.borderColor = '#152a4a'}
                    >
                      <span style={{ fontSize: 28, flexShrink: 0 }}>🌳</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ color: '#a0c8f0', fontWeight: 700, fontSize: 16, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</div>
                        <div style={{ color: '#2a5070', fontSize: 12, marginTop: 3 }}>{memberCount} thành viên · Tạo {date}</div>
                      </div>
                      <button
                        onClick={e => { e.stopPropagation(); handleDelete(f.id, f.name); }}
                        style={{ background: '#180a08', color: '#905050', border: '1px solid #3a1818', borderRadius: 6, padding: '4px 10px', fontSize: 12, flexShrink: 0 }}
                      >🗑 Xóa</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{ padding: '20px 24px', borderTop: '1px solid #0a1e38', display: 'flex', justifyContent: 'center' }}>
            <button
              onClick={() => setShowCreate(true)}
              style={{ background: '#0e2e14', color: '#50c878', border: '1px solid #1e6030', borderRadius: 8, padding: '10px 28px', fontSize: 15, fontWeight: 600 }}
            >+ Tạo gia phả mới</button>
          </div>

          {/* Create modal */}
          {showCreate && (
            <div className="modal" onMouseDown={e => { if (e.target === e.currentTarget) setShowCreate(false); }}>
              <div className="modal-content" style={{ width: 360 }}>
                <div className="modal-header">
                  <span>Tạo gia phả mới</span>
                  <button className="modal-close" onClick={() => setShowCreate(false)}>×</button>
                </div>
                <div className="form-group">
                  <label className="form-label">Tên gia phả *</label>
                  <input
                    value={newName}
                    onChange={e => setNewName(e.target.value)}
                    placeholder="VD: Gia phả họ Lê, Dòng họ Nguyễn..."
                    autoFocus
                    onKeyDown={e => e.key === 'Enter' && handleCreate()}
                    style={{ width: '100%' }}
                  />
                </div>
                <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 18 }}>
                  <button onClick={() => setShowCreate(false)} style={{ background: 'transparent', color: '#5a7898' }}>Hủy</button>
                  <button onClick={handleCreate} disabled={!newName.trim() || creating} style={{ background: newName.trim() ? '#1440a0' : '#0c1a30', color: newName.trim() ? '#a0c8f8' : '#3a5070', opacity: newName.trim() ? 1 : 0.5 }}>{creating ? 'Đang tạo...' : 'Tạo'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ───────────────────────────────────────────────────────────────────────────
    function App({ familyId, familyName, onBack }) {
      const KEY          = familyTreeKey(familyId);
      const SETTINGS_KEY = familySettingsKey(familyId);
      const INTRO_KEY_F  = familyIntroKey(familyId);
      const [tree, setTree] = useState(null);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(null);
      const [dragMode, setDragMode] = useState(false);
      const [dragState, setDragState] = useState(null);
      const [view, setView] = useState('tree'); // 'tree' | 'text'
      const [showSettings, setShowSettings] = useState(false);
      const [showSearch, setShowSearch] = useState(false);
      const [showData, setShowData] = useState(false);
      const [showNoiToc, setShowNoiToc] = useState(false);
      const [showGioiThieu, setShowGioiThieu] = useState(false);
      const [showNgayGio, setShowNgayGio] = useState(false);
      const [infoPopup, setInfoPopup] = useState(null); // node object
      const [settings, setSettings] = useState(() => {
        try { const s = localStorage.getItem(SETTINGS_KEY); return s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : DEFAULT_SETTINGS; }
        catch { return DEFAULT_SETTINGS; }
      });

      const handleSettingsChange = useCallback((key, value) => {
        if (key === 'reset') { setSettings(DEFAULT_SETTINGS); localStorage.setItem(SETTINGS_KEY, JSON.stringify(DEFAULT_SETTINGS)); return; }
        setSettings(prev => { const next = { ...prev, [key]: value }; localStorage.setItem(SETTINGS_KEY, JSON.stringify(next)); return next; });
      }, []);

      // ── Pan / drag-to-scroll ──────────────────────────────────────────────────
      const viewportRef = useRef(null);
      const panRef = useRef({ active: false, moved: false, startX: 0, startY: 0, offX: 0, offY: 0 });
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [isPanning, setIsPanning] = useState(false);

      const startPan = useCallback((clientX, clientY) => {
        panRef.current = { active: true, moved: false, startX: clientX, startY: clientY, offX: pan.x, offY: pan.y };
        setIsPanning(true);
      }, [pan]);

      // Clamp pan: không cho kéo canvas xuống dưới hay sang phải quá gốc (0,0)
      const clampPan = (x, y) => ({ x: Math.min(0, x), y: Math.min(0, y) });

      // Global mouse handlers registered once
      useEffect(() => {
        const onMove = (e) => {
          if (!panRef.current.active) return;
          const dx = e.clientX - panRef.current.startX;
          const dy = e.clientY - panRef.current.startY;
          if (Math.abs(dx) > 4 || Math.abs(dy) > 4) panRef.current.moved = true;
          if (panRef.current.moved) setPan(clampPan(panRef.current.offX + dx, panRef.current.offY + dy));
        };
        const onUp = () => { if (panRef.current.active) { panRef.current.active = false; setIsPanning(false); } };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
      }, []);

      // Touch pan (non-passive so we can preventDefault)
      useEffect(() => {
        const el = viewportRef.current; if (!el) return;
        const onStart = (e) => {
          if (e.touches.length !== 1) return;
          const t = e.touches[0];
          panRef.current = { active: true, moved: false, startX: t.clientX, startY: t.clientY, offX: pan.x, offY: pan.y };
          setIsPanning(true);
        };
        const onMove = (e) => {
          if (!panRef.current.active || e.touches.length !== 1) return;
          e.preventDefault();
          const t = e.touches[0];
          const dx = t.clientX - panRef.current.startX;
          const dy = t.clientY - panRef.current.startY;
          panRef.current.moved = true;
          setPan(clampPan(panRef.current.offX + dx, panRef.current.offY + dy));
        };
        const onEnd = () => { panRef.current.active = false; setIsPanning(false); };
        el.addEventListener('touchstart', onStart, { passive: true });
        el.addEventListener('touchmove', onMove, { passive: false });
        el.addEventListener('touchend', onEnd, { passive: true });
        return () => { el.removeEventListener('touchstart', onStart); el.removeEventListener('touchmove', onMove); el.removeEventListener('touchend', onEnd); };
      }, [pan]); // re-attach when pan changes so offX/offY are fresh

      const handleViewportMouseDown = (e) => {
        // Skip if clicking on an interactive element
        if (e.target.closest('button, input, select, a')) return;
        startPan(e.clientX, e.clientY);
      };

      // Swallow click after a pan drag so node buttons don't fire
      const handleViewportClickCapture = (e) => {
        if (panRef.current.moved) { e.stopPropagation(); panRef.current.moved = false; }
      };

      useEffect(() => { const saved = localStorage.getItem(KEY); setTree(saved ? JSON.parse(saved) : SAMPLE); setLoading(false); }, []);
      useEffect(() => { if (loading || !tree) return; localStorage.setItem(KEY, JSON.stringify(tree)); }, [tree, loading]);

      const handleUpdate = useCallback((id, fn) => setTree(prev => updateNode(prev, id, fn)), []);
      const handleDelete = useCallback((id) => setTree(prev => deleteNode(prev, id)), []);

      // ── Search: keyboard shortcut & navigate ─────────────────────────────────
      useEffect(() => {
        const onKey = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); setShowSearch(true); }
          if (e.key === 'Escape') setShowSearch(false);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const handleSearchNavigate = useCallback((nodeId) => {
        setShowSearch(false);
        setView('tree');
        // Expand path to the node
        setTree(prev => prev ? expandPathTo(prev, nodeId) : prev);
        // Scroll to node after render
        setTimeout(() => {
          const el = document.querySelector(`[data-node-id="${nodeId}"]`);
          if (el) {
            const vpRect = viewportRef.current?.getBoundingClientRect();
            const elRect = el.getBoundingClientRect();
            if (vpRect) {
              const dx = (vpRect.left + vpRect.width / 2) - (elRect.left + elRect.width / 2);
              const dy = (vpRect.top + vpRect.height / 2) - (elRect.top + elRect.height / 2);
              setPan(p => clampPan(p.x + dx, p.y + dy));
              // Highlight effect
              el.style.background = 'rgba(100,180,255,0.18)';
              el.style.borderRadius = '4px';
              setTimeout(() => { el.style.background = ''; el.style.borderRadius = ''; }, 1500);
            }
          }
        }, 80);
      }, []);
      const handleDrop = useCallback((draggedId, targetId, position) => {
        setTree(prev => {
          if (!prev || draggedId === prev.id) return prev;
          const [treeWithout, extracted] = extractNode(prev, draggedId); if (!extracted) return prev;
          if (position === 'inside') return insertAsChild(treeWithout, targetId, extracted);
          if (targetId === treeWithout.id) return insertAsChild(treeWithout, targetId, extracted);
          return insertAsSibling(treeWithout, targetId, extracted, position);
        });
      }, []);

      const handleAdd = (form) => { const child = { id: genId(), collapsed: false, children: [], ...form }; handleUpdate(modal.nodeId, n => ({ ...n, children: [...n.children, child] })); setModal(null); };
      const handleEdit = (form) => { handleUpdate(modal.nodeId, n => ({ ...n, ...form })); setModal(null); };
      const transformAll = (fn) => setTree(prev => { function walk(n) { return { ...fn(n), children: n.children.map(walk) }; } return walk(prev); });

      if (loading) return <div style={{ background: "#060e1c", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#3a6898", fontFamily: "monospace" }}>Đang tải gia phả...</div>;

      const totalMembers = tree ? countDesc(tree) + 1 : 0;

      return (
        <SettingsCtx.Provider value={settings}>
        <DragCtx.Provider value={{ dragState, setDragState, onDrop: handleDrop }}>
          <div style={{ background: "#060e1c", height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }} className={dragMode ? "drag-mode-active" : ""}>
            <div className="header">
              <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1 }}>
                <button onClick={onBack} style={{ fontSize: 13, background: 'transparent', border: '1px solid #1a3252', color: '#4a7898', padding: '4px 10px', marginRight: 4 }}>← Về trang chủ</button>
                <span style={{ fontSize: 18 }}>🌳</span>
                <span className="header-title">{familyName}</span>
                <span style={{ color: "#1e3858", fontSize: 12 }}>|</span>
                <span style={{ color: "#2a5080", fontSize: 12 }}>{totalMembers} thành viên</span>
              </div>
              {/* Tab chuyển đổi */}
              <button className={"tab-btn" + (view === 'tree' ? ' active' : '')} onClick={() => setView('tree')}>🌳 Cây</button>
              <button className={"tab-btn" + (view === 'text' ? ' active' : '')} onClick={() => setView('text')}>📝 Text</button>
              {view === 'tree' && <>
                <button onClick={() => setDragMode(v => !v)} style={{ fontSize: 12, background: dragMode ? "#0e2e14" : "#0a1e38", color: dragMode ? "#60c878" : "#5a9ad8", border: dragMode ? "1px solid #1e6030" : "1px solid #1a3a60", fontWeight: dragMode ? 600 : 400 }}>{dragMode ? "✓ Đang kéo thả" : "⠿ Kéo thả"}</button>
                <ExpandMenu tree={tree} transformAll={transformAll} />
              </>}
              <button
                onClick={() => setShowNgayGio(true)}
                title="Danh sách ngày giỗ"
                style={{ fontSize: 13, padding: '5px 10px', background: '#0a1e38', color: '#c89040', border: '1px solid #3a2800' }}
              >🕯️ Ngày Giỗ</button>
              <button
                onClick={() => setShowGioiThieu(true)}
                title="Giới thiệu về gia phả"
                style={{ fontSize: 13, padding: '5px 10px' }}
              >📜 Giới thiệu</button>
              <button
                onClick={() => setShowNoiToc(v => !v)}
                title="Danh sách nội tộc"
                style={{ fontSize: 13, padding: '5px 10px', background: showNoiToc ? '#0a2040' : '#0a1e38', color: showNoiToc ? '#60c878' : '#5a9ad8', border: showNoiToc ? '1px solid #2a5080' : '1px solid #1a3a60', fontWeight: showNoiToc ? 600 : 400 }}
              >Nội tộc</button>
              <button
                onClick={() => setShowData(v => !v)}
                title="Xuất/nhập dữ liệu JSON"
                style={{ fontSize: 13, padding: '5px 10px', background: showData ? '#0a2040' : '#0a1e38', color: showData ? '#6aaaf0' : '#5a9ad8', border: showData ? '1px solid #2a5080' : '1px solid #1a3a60', fontWeight: showData ? 600 : 400 }}
              >💾 Data</button>
              <button
                onClick={() => setShowSearch(v => !v)}
                title="Tìm kiếm thành viên (Ctrl+F)"
                style={{ fontSize: 14, padding: '5px 10px', background: showSearch ? '#0a2040' : '#0a1e38', color: showSearch ? '#6aacf0' : '#5a9ad8', border: showSearch ? '1px solid #2a5080' : '1px solid #1a3a60' }}
              >🔍</button>
              <button
                onClick={() => setShowSettings(v => !v)}
                className={showSettings ? 'btn-active' : ''}
                title="Cài đặt hiển thị"
                style={{ fontSize: 13, padding: '5px 10px' }}
              >⚙ Cài đặt</button>
            </div>

            {showSettings && (
              <SettingsPanel settings={settings} onChange={handleSettingsChange} />
            )}

            {view === 'tree' && (
              <>
                <div className="legend">
                  <span><span style={{ color: "#6aacf0" }}>█</span> Nam</span>
                  <span><span style={{ color: "#f080a0" }}>█</span> Nữ</span>
                  <span><span style={{ color: "#f080a0" }}>+</span> Bạn đời</span>
                  <span>✦ Ngày giỗ</span>
                  {dragMode
                    ? <span style={{ color: "#2a7848" }}>⠿ Kéo handle để di chuyển node</span>
                    : <span style={{ color: "#1a4060" }}>✥ Kéo vùng trống để cuộn · Di chuột vào tên để sửa</span>}
                  
                </div>
                <div
                  ref={viewportRef}
                  className={"tree-viewport" + (isPanning ? " is-panning" : "")}
                  onMouseDown={handleViewportMouseDown}
                  onClickCapture={handleViewportClickCapture}
                >
                  <div className="tree-canvas" style={{ transform: `translate(${pan.x}px, ${pan.y}px)` }}>
                    {tree && <TreeNode node={tree} onUpdate={handleUpdate} onDelete={handleDelete} isRoot={true} showModal={setModal} dragMode={dragMode} parentGen={tree.generation} showInfo={setInfoPopup} />}
                  </div>
                </div>
              </>
            )}

            {view === 'text' && tree && (
              <TextEditor
                tree={tree}
                onImport={(newTree) => { setTree(newTree); setView('tree'); }}
                onCancel={() => setView('tree')}
              />
            )}

            {showNgayGio && (
              <NgayGioPopup tree={tree} onClose={() => setShowNgayGio(false)} />
            )}

            {showData && (
              <DataPopup
                tree={tree}
                settings={settings}
                setTree={setTree}
                setSettings={setSettings}
                onClose={() => setShowData(false)}
                storageKeys={{ KEY, SETTINGS_KEY, INTRO_KEY_F }}
              />
            )}

            {showGioiThieu && (
              <GioiThieuPopup onClose={() => setShowGioiThieu(false)} introKey={INTRO_KEY_F} />
            )}

            {showNoiToc && (
              <NoiTocPanel
                tree={tree}
                onClose={() => setShowNoiToc(false)}
              />
            )}

            {infoPopup && (
              <NodeInfoPopup
                node={infoPopup.node}
                parentNode={infoPopup.parentNode}
                onClose={() => setInfoPopup(null)}
                onEdit={() => { setModal({ type: "edit", nodeId: infoPopup.node.id, node: infoPopup.node, parentGen: infoPopup.node.generation }); setInfoPopup(null); }}
                onAdd={() => { setModal({ type: "add", nodeId: infoPopup.node.id, parentGen: infoPopup.node.generation, parentName: infoPopup.node.name }); setInfoPopup(null); }}
              />
            )}

            {showSearch && (
              <SearchModal
                tree={tree}
                onClose={() => setShowSearch(false)}
                onNavigate={handleSearchNavigate}
              />
            )}

            {modal && (
              <div className="modal" onMouseDown={e => { if (e.target === e.currentTarget) setModal(null); }}>
                <div className="modal-content">
                  <div className="modal-header">
                    <div>
                      <div>{modal.type === "add" ? "Thêm thành viên" : "Sửa thông tin"}</div>
                      {modal.type === "add" && modal.parentName && <div style={{ color: "#2a4a68", fontSize: 12, marginTop: 2 }}>Thêm vào: <span style={{ color: "#4a7aaa" }}>{modal.parentName}</span></div>}
                    </div>
                    <button className="modal-close" onClick={() => setModal(null)}>×</button>
                  </div>
                  {modal.type === "add" && <MemberForm parentGen={modal.parentGen} isSpouseDefault={false} onSave={handleAdd} onCancel={() => setModal(null)} />}
                  {modal.type === "edit" && <MemberForm initial={modal.node} parentGen={modal.parentGen ?? modal.node.generation} isSpouseDefault={modal.node.isSpouse} onSave={handleEdit} onCancel={() => setModal(null)} />}
                </div>
              </div>
            )}
          </div>
        </DragCtx.Provider>
        </SettingsCtx.Provider>
      );
    }

    function Root() {
      const [currentFamily, setCurrentFamily] = useState(null);
      if (!currentFamily) {
        return <HomeScreen onOpen={f => setCurrentFamily(f)} />;
      }
      return <App familyId={currentFamily.id} familyName={currentFamily.name} onBack={() => setCurrentFamily(null)} />;
    }

    ReactDOM.render(<Root />, document.getElementById('root'));
  </script>
</body>
</html>
