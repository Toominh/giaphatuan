  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
    function updateNode(node, id, fn) { return node.id === id ? fn(node) : { ...node, children: node.children.map(c => updateNode(c, id, fn)) }; }
    function deleteNode(node, id) { return { ...node, children: node.children.filter(c => c.id !== id).map(c => deleteNode(c, id)) }; }
    function countDesc(n) { return n.children.reduce((a, c) => a + 1 + countDesc(c), 0); }
    function findNode(root, id) { if (root.id === id) return root; for (const c of root.children) { const f = findNode(c, id); if (f) return f; } return null; }

    // ── Search: collect all nodes flat ──────────────────────────────────────────
    function collectAllNodes(node, results = []) {
      results.push(node);
      for (const c of (node.children || [])) collectAllNodes(c, results);
      return results;
    }
    function highlightMatch(text, query) {
      if (!query) return text;
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      return (
        <span>
          {text.slice(0, idx)}
          <span className="search-highlight">{text.slice(idx, idx + query.length)}</span>
          {text.slice(idx + query.length)}
        </span>
      );
    }
    // Expand ancestors so a node is visible in tree
    function expandPathTo(tree, targetId) {
      function walk(node) {
        if (node.id === targetId) return true;
        for (const c of node.children) {
          if (walk(c)) { return true; }
        }
        return false;
      }
      function expand(node) {
        const hasTarget = walk(node);
        const newChildren = node.children.map(expand);
        if (hasTarget && node.id !== targetId) return { ...node, collapsed: false, children: newChildren };
        return { ...node, children: newChildren };
      }
      return expand(tree);
    }
    function isAncestor(root, ancestorId, descendantId) {
      function check(node, tid) { if (node.id === tid) return true; return node.children.some(c => check(c, tid)); }
      const anc = findNode(root, ancestorId); if (!anc) return false; return check(anc, descendantId);
    }
    function extractNode(root, id) {
      let extracted = null;
      function walk(node) { const idx = node.children.findIndex(c => c.id === id); if (idx !== -1) { extracted = node.children[idx]; return { ...node, children: node.children.filter(c => c.id !== id) }; } return { ...node, children: node.children.map(walk) }; }
      return [walk(root), extracted];
    }
    function insertAsChild(root, parentId, nodeToInsert) { return updateNode(root, parentId, n => ({ ...n, children: [...n.children, nodeToInsert] })); }
    function insertAsSibling(root, siblingId, nodeToInsert, position) {
      function walk(node) { const idx = node.children.findIndex(c => c.id === siblingId); if (idx !== -1) { const nc = [...node.children]; nc.splice(position === 'before' ? idx : idx + 1, 0, nodeToInsert); return { ...node, children: nc }; } return { ...node, children: node.children.map(walk) }; }
      return walk(root);
    }

    // ─── TEXT ↔ TREE CONVERSION ────────────────────────────────────────────────
    /*
      Định dạng text:
        Tên đầy đủ - biệt hiệu (nữ) [dd/mm] [năm sinh-năm mất] ✦ ngày giỗ
        + Bạn đời (nữ) [...]
              Con (thụt lề sâu hơn 6 spaces hoặc 1 tab)

      Quy tắc:
        - Bắt đầu bằng "+" → isSpouse = true
        - "(nữ)" trong tên → gender = female
        - "[dd/mm]" hoặc "[dd/mm âm lịch]" → deathAnniversary
        - "[yyyy-yyyy]" hoặc "[yyyy-]" hoặc "[-yyyy]" → birthYear/deathYear
        - "- tên khác" sau họ tên chính → gắn vào tên (giữ nguyên)
        - Thụt lề: mỗi 6 spaces (hoặc 1 tab = 6sp) = 1 cấp con
    */

    const INDENT_UNIT = 6; // spaces per level

    function treeToText(node, level = 0) {
      const indent = ' '.repeat(level * INDENT_UNIT);
      let line = indent;
      if (node.isSpouse) line += '+ ';

      // Tên
      line += node.name;

      // Giới tính nếu là nữ
      if (node.gender === 'female') line += ' (nữ)';

      // Năm sinh - mất
      const by = node.birthYear, dy = node.deathYear;
      if (by || dy) line += ` [${by || ''}-${dy || ''}]`;

      // Ngày giỗ
      if (node.deathAnniversary) line += ` ✦ ${node.deathAnniversary}`;

      let lines = [line];
      for (const child of (node.children || [])) {
        lines = lines.concat(treeToText(child, level + 1));
      }
      return lines;
    }

    function textToTree(text) {
      // Tách thành dòng, bỏ dòng trắng
      const rawLines = text.split('\n');
      const lines = rawLines.map((l, i) => {
        // Đổi tab → 6 spaces
        const expanded = l.replace(/\t/g, ' '.repeat(INDENT_UNIT));
        const indent = expanded.length - expanded.trimStart().length;
        const content = expanded.trimStart();
        return { raw: l, lineNum: i + 1, indent, content };
      }).filter(l => l.content.trim() !== '');

      if (lines.length === 0) throw new Error('Không có dữ liệu');

      function parseLine(l) {
        let content = l.content;
        let isSpouse = false;
        if (content.startsWith('+ ')) { isSpouse = true; content = content.slice(2); }
        else if (content.startsWith('+')) { isSpouse = true; content = content.slice(1).trimStart(); }

        let gender = 'male';
        // (nữ) bất kỳ chỗ nào
        if (/\(nữ\)/i.test(content)) { gender = 'female'; content = content.replace(/\s*\(nữ\)/i, ''); }

        let birthYear = null, deathYear = null;
        // [yyyy-yyyy] hoặc [yyyy-] hoặc [-yyyy]
        const yearMatch = content.match(/\[(\d{4})?-(\d{4})?\]/);
        if (yearMatch) {
          birthYear = yearMatch[1] ? parseInt(yearMatch[1]) : null;
          deathYear = yearMatch[2] ? parseInt(yearMatch[2]) : null;
          content = content.replace(yearMatch[0], '').trim();
        }

        let deathAnniversary = '';
        // ✦ hoặc ~ ngày giỗ
        const annMatch = content.match(/[✦~]\s*(.+)$/);
        if (annMatch) { deathAnniversary = annMatch[1].trim(); content = content.slice(0, annMatch.index).trim(); }

        let generation = null;
        const genMatch = content.match(/§(\d+)/);
        if (genMatch) { generation = parseInt(genMatch[1]); content = content.replace(genMatch[0], '').trim(); }

        const name = content.trim();
        if (!name) throw new Error(`Dòng ${l.lineNum}: Thiếu tên`);

        return { id: genId(), name, gender, birthYear, deathYear, deathAnniversary, isSpouse, generation: generation || 1, collapsed: false, children: [] };
      }

      // Xây cây từ indent
      // Stack lưu { node, indent }
      const rootLine = lines[0];
      const rootNode = parseLine(rootLine);

      const stack = [{ node: rootNode, indent: rootLine.indent }];

      for (let i = 1; i < lines.length; i++) {
        const l = lines[i];
        const node = parseLine(l);

        // Tìm cha: pop stack cho đến khi stack top có indent < dòng hiện tại
        while (stack.length > 1 && stack[stack.length - 1].indent >= l.indent) {
          stack.pop();
        }
        const parent = stack[stack.length - 1].node;
        parent.children.push(node);
        stack.push({ node, indent: l.indent });
      }

      // Gán generation theo cấp nếu không có §
      function assignGen(node, gen) {
        if (!node._hasExplicitGen) node.generation = gen;
        // Con của ai cũng đều là đời tiếp theo; isSpouse chỉ ảnh hưởng đến bản thân node đó
        node.children.forEach(c => assignGen(c, c.isSpouse ? gen : gen + 1));
      }
      // Mark explicit gen
      function markExplicit(node) {
        // already parsed, nếu generation được set từ §, giữ nguyên
        node.children.forEach(markExplicit);
      }
      assignGen(rootNode, rootNode.generation || 1);

      return rootNode;
    }

    // ───────────────────────────────────────────────────────────────────────────

    const KEY = "gia_pha_v1";
    const SETTINGS_KEY = "gia_pha_settings_v1";
    const INTRO_KEY = "giapha_intro_html";
    const DEFAULT_SETTINGS = {
      fontSize: 14,
      colorMale: '#6aacf0',
      colorFemale: '#f080a0',
      colorYears: '#7a9ab8',
      colorAnniversary: '#60a878',
      colorGeneration: '#3a6888',
    };
    const SettingsCtx = React.createContext(DEFAULT_SETTINGS);
    const SAMPLE = {
      id: "root", name: "Lê Văn Lăm", gender: "male", birthYear: 1897, deathYear: 1976, deathAnniversary: "", generation: 6, isSpouse: false, collapsed: false,
      children: [{
        id: "s1", name: "Nguyễn Thị Huệ", gender: "female", birthYear: 1896, deathYear: 1985, deathAnniversary: "", generation: 6, isSpouse: true, collapsed: false,
        children: [{
          id: "c1", name: "Lê Văn Đàm", gender: "male", birthYear: 1919, deathYear: 1985, deathAnniversary: "", generation: 7, isSpouse: false, collapsed: false,
          children: [{
            id: "s2", name: "Nguyễn Thị Tới", gender: "female", birthYear: 1918, deathYear: 2017, deathAnniversary: "", generation: 7, isSpouse: true, collapsed: false,
            children: [
              { id: "c2", name: "Lê Quang Đạm", gender: "male", birthYear: 1940, deathYear: 1990, deathAnniversary: "15/3 âm lịch", generation: 8, isSpouse: false, collapsed: false, children: [] },
              { id: "c3", name: "Lê Văn Điềm", gender: "male", birthYear: 1942, deathYear: 2025, deathAnniversary: "", generation: 8, isSpouse: false, collapsed: false, children: [] }
            ]
          }]
        }]
      }]
    };

    function MemberForm({ initial, parentGen, isSpouseDefault, onSave, onCancel }) {
      const [name, setName] = useState(initial?.name || "");
      const [gender, setGender] = useState(initial?.gender || "male");
      const [bYear, setBYear] = useState(initial?.birthYear || "");
      const [dYear, setDYear] = useState(initial?.deathYear || "");
      const [ann, setAnn] = useState(initial?.deathAnniversary || "");
      const [isSpouse, setIsSpouse] = useState(initial?.isSpouse !== undefined ? initial.isSpouse : (isSpouseDefault || false));
      // Đời tự tính: bạn đời = cùng đời cha, con = đời cha + 1
      // Khi sửa: giữ nguyên đời cũ. Khi thêm mới: tính từ cha
      const computedGen = initial
        ? initial.generation
        : (isSpouse ? parentGen : parentGen + 1);
      const save = () => {
        if (!name.trim()) return;
        onSave({ name: name.trim(), gender, birthYear: bYear ? parseInt(bYear) : null, deathYear: dYear ? parseInt(dYear) : null, deathAnniversary: ann.trim(), isSpouse, generation: computedGen });
      };
      return (
        <div>

          <div className="form-row">
            <div className="form-group"><label className="form-label">Giới tính</label><select value={gender} onChange={e => setGender(e.target.value)}><option value="male">Nam</option><option value="female">Nữ</option></select></div>
            <div className="form-group"><label className="form-label">Loại quan hệ</label><select value={isSpouse ? "yes" : "no"} onChange={e => setIsSpouse(e.target.value === "yes")}><option value="no">Con cái</option><option value="yes">Bạn đời (+)</option></select></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Năm sinh</label><input type="number" inputMode="numeric" value={bYear} onChange={e => setBYear(e.target.value)} placeholder="VD: 1950" min="1600" max="2100" /></div>
            <div className="form-group"><label className="form-label">Năm mất</label><input type="number" inputMode="numeric" value={dYear} onChange={e => setDYear(e.target.value)} placeholder="VD: 2020" min="1600" max="2100" /></div>
          </div>
          <div className="form-group">
            <label className="form-label">Ngày giỗ (ngày/tháng âm lịch)</label>
            <input
              value={ann}
              onChange={e => {
                // Chỉ cho nhập số và /
                let v = e.target.value.replace(/[^\d/]/g, '');
                // Tự chèn / sau 2 số đầu
                if (/^\d{2}$/.test(v) && !ann.includes('/')) v = v + '/';
                if (v.length > 5) v = v.slice(0, 5);
                setAnn(v);
              }}
              placeholder="dd/mm"
              inputMode="numeric"
              pattern="\d{1,2}/\d{1,2}"
              maxLength={5}
            />
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 18 }}>
            <button onClick={onCancel} style={{ background: "transparent", color: "#5a7898" }}>Hủy</button>
            <button onClick={save} disabled={!name.trim()} style={{ background: name.trim() ? "#1440a0" : "#0c1a30", color: name.trim() ? "#a0c8f8" : "#3a5070", opacity: name.trim() ? 1 : 0.5 }}>Lưu</button>
          </div>
        </div>
      );
    }

    // ── Settings Panel ──────────────────────────────────────────────────────────
    function SettingsPanel({ settings, onChange }) {
      const colorFields = [
        { label: 'Tên Nam',      key: 'colorMale' },
        { label: 'Tên Nữ',       key: 'colorFemale' },
        { label: 'Năm sinh/mất', key: 'colorYears' },
        { label: 'Ngày giỗ',     key: 'colorAnniversary' },
        { label: 'Số đời',       key: 'colorGeneration' },
      ];
      const previewFs = settings.fontSize;
      return (
        <div className="settings-panel">
          {/* Font size */}
          <div>
            <div className="settings-section-title">⬚ Cỡ chữ</div>
            <div className="font-control" style={{ marginBottom: 10 }}>
              <button className="font-btn" onClick={() => onChange('fontSize', Math.max(10, settings.fontSize - 1))}>−</button>
              <span className="font-display">{settings.fontSize}</span>
              <button className="font-btn" onClick={() => onChange('fontSize', Math.min(26, settings.fontSize + 1))}>+</button>
              <input type="range" className="font-slider" min={10} max={26} value={settings.fontSize}
                onChange={e => onChange('fontSize', parseInt(e.target.value))} />
              <span style={{ color: '#2a4a68', fontSize: 11 }}>px</span>

            <div className="settings-preview" style={{ fontSize: previewFs }}>
              <span style={{ color: settings.colorMale, fontWeight: 600 }}>Lê Văn Lăm</span>
              {' '}<span style={{ color: settings.colorGeneration, fontSize: previewFs * 0.85 }}>(đời 6)</span>
              {' '}<span style={{ color: settings.colorYears, fontSize: previewFs * 0.85, fontStyle: 'italic' }}>(1897–1976)</span>
              {' '}<span style={{ color: settings.colorAnniversary, fontSize: previewFs * 0.82 }}>✦ 5/8</span>
              <br/>
              <span style={{ color: settings.colorFemale, fontWeight: 600 }}>+ Nguyễn Thị Huệ</span>
              {' '}<span style={{ color: settings.colorGeneration, fontSize: previewFs * 0.85 }}>(đời 6)</span>
            </div>
          </div>

          {/* Color pickers */}
          <div>
            <div className="settings-section-title">🎨 Màu sắc</div>
            {colorFields.map(({ label, key }) => (
              <div key={key} className="color-row" onClick={() => document.getElementById('cp_' + key).click()}>
                <input
                  id={'cp_' + key}
                  type="color"
                  value={settings[key]}
                  onChange={e => onChange(key, e.target.value)}
                  style={{ width: 0, height: 0, opacity: 0, position: 'absolute', pointerEvents: 'none' }}
                />
                <div className="color-swatch" style={{ background: settings[key] }} />
                <span className="color-label" style={{ color: settings[key] }}>{label}</span>
                <span style={{ color: '#1a3050', fontSize: 11, fontFamily: 'monospace' }}>{settings[key]}</span>
              </div>
            ))}
          </div>

          {/* Reset */}
          <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', gap: 6 }}>
            <div className="settings-section-title">⟳ Khác</div>
            <button onClick={() => onChange('reset')}
              style={{ fontSize: 11, color: '#4a6888', background: 'transparent', border: '1px solid #1a3050', borderRadius: 5, padding: '4px 10px' }}>
              Đặt lại mặc định
            </button>
          </div>
        </div>
      );
    }

    // ── Data Popup ──────────────────────────────────────────────────────────────
    function DataPopup({ tree, settings, setTree, setSettings, onClose, storageKeys }) {
      const { KEY, SETTINGS_KEY, INTRO_KEY_F } = storageKeys;
      const [status, setStatus] = React.useState(null); // { type: 'ok'|'err', msg }
      const [loadingMsg, setLoadingMsg] = React.useState('');

      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      // ── 1. Xuất data JSON ────────────────────────────────────────────────────
      const handleExport = () => {
        try {
          const intro = localStorage.getItem(INTRO_KEY_F) || '';
          const payload = {
            version: '2',
            exportDate: new Date().toISOString(),
            tree,
            settings,
            intro,
          };
          const json = JSON.stringify(payload, null, 2);
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `gia-pha-${new Date().toISOString().slice(0, 10)}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          setStatus({ type: 'ok', msg: '✓ Đã xuất file thành công' });
        } catch (e) {
          setStatus({ type: 'err', msg: '✗ Lỗi: ' + e.message });
        }
      };

      // ── 2. Nhập data JSON ────────────────────────────────────────────────────
      const handleImport = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json,application/json';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          setLoadingMsg('Đang đọc file…');
          const reader = new FileReader();
          reader.onload = (ev) => {
            setLoadingMsg('');
            try {
              const data = JSON.parse(ev.target.result);
              applyImportedData(data);
            } catch {
              setStatus({ type: 'err', msg: '✗ File không hợp lệ hoặc không phải JSON' });
            }
          };
          reader.onerror = () => { setLoadingMsg(''); setStatus({ type: 'err', msg: '✗ Không đọc được file' }); };
          reader.readAsText(file);
        };
        input.click();
      };

      // ── 3. Nhập dữ liệu mẫu ─────────────────────────────────────────────────
      const handleLoadSample = async () => {
        setLoadingMsg('Đang tải datamau.json…');
        setStatus(null);
        try {
          const res = await fetch('./datamau.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status} – không tìm thấy datamau.json`);
          const data = await res.json();
          applyImportedData(data);
          setLoadingMsg('');
        } catch (e) {
          setLoadingMsg('');
          setStatus({ type: 'err', msg: '✗ ' + e.message });
        }
      };

      // Shared helper: apply imported payload (full export or bare tree)
      const applyImportedData = (data) => {
        // Full export format { version, tree, settings, intro }
        if (data.tree && data.tree.id && Array.isArray(data.tree.children)) {
          setTree(data.tree);
          if (data.settings && typeof data.settings === 'object') {
            const ns = { ...DEFAULT_SETTINGS, ...data.settings };
            setSettings(ns);
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(ns));
          }
          if (typeof data.intro === 'string' && data.intro.trim()) {
            localStorage.setItem(INTRO_KEY_F, data.intro);
          }
          const members = countDesc(data.tree) + 1;
          setStatus({ type: 'ok', msg: `✓ Đã nhập thành công · ${members} thành viên` });
        }
        // Bare tree format (just the root node)
        else if (data.id && Array.isArray(data.children)) {
          setTree(data);
          const members = countDesc(data) + 1;
          setStatus({ type: 'ok', msg: `✓ Đã nhập thành công · ${members} thành viên` });
        }
        else {
          setStatus({ type: 'err', msg: '✗ Định dạng JSON không hợp lệ' });
        }
      };

      // ── 4. Xóa bộ nhớ trình duyệt ───────────────────────────────────────────
      const handleClearStorage = () => {
        if (!window.confirm('Xóa toàn bộ dữ liệu đã lưu?\n\n• Gia phả\n• Cài đặt (font, màu)\n• Nội dung giới thiệu\n\nHành động này không thể hoàn tác!')) return;
        try {
          localStorage.removeItem(KEY);
          localStorage.removeItem(SETTINGS_KEY);
          localStorage.removeItem(INTRO_KEY_F);
          setTree(SAMPLE);
          setSettings(DEFAULT_SETTINGS);
          setStatus({ type: 'ok', msg: '✓ Đã xóa bộ nhớ trình duyệt' });
        } catch (e) {
          setStatus({ type: 'err', msg: '✗ Lỗi: ' + e.message });
        }
      };

      return (
        <div className="data-overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="data-panel">
            {/* Header */}
            <div className="data-panel-header">
              <span style={{ fontSize: 20 }}>💾</span>
              <span className="data-panel-title">Dữ liệu</span>
              <button onClick={onClose} className="modal-close" style={{ fontSize: 20 }}>×</button>
            </div>

            {/* Status bar */}
            {(status || loadingMsg) && (
              <div style={{
                padding: '7px 18px',
                fontSize: 12,
                background: status?.type === 'ok' ? 'rgba(20,80,40,0.3)' : status?.type === 'err' ? 'rgba(80,20,20,0.3)' : 'rgba(20,40,80,0.3)',
                color: status?.type === 'ok' ? '#50c878' : status?.type === 'err' ? '#e06070' : '#6aaaf0',
                borderBottom: '1px solid #0e2040',
              }}>
                {loadingMsg || status?.msg}
              </div>
            )}

            {/* Action buttons */}
            <div className="data-btn-row">
              {/* Xuất */}
              <button className="data-action-btn" onClick={handleExport}>
                <span className="da-icon">⬇️</span>
                <span className="da-text">
                  <span className="da-title">Xuất data JSON</span>
                  <span className="da-desc">Tải về file .json chứa gia phả, cài đặt và giới thiệu</span>
                </span>
              </button>

              {/* Nhập */}
              <button className="data-action-btn" onClick={handleImport}>
                <span className="da-icon">⬆️</span>
                <span className="da-text">
                  <span className="da-title">Nhập data JSON</span>
                  <span className="da-desc">Khôi phục từ file .json đã xuất trước đó</span>
                </span>
              </button>

              {/* Dữ liệu mẫu */}
              <button className="data-action-btn sample" onClick={handleLoadSample}>
                <span className="da-icon">📋</span>
                <span className="da-text">
                  <span className="da-title">Nhập dữ liệu mẫu</span>
                  <span className="da-desc">Tải file <code style={{ color: '#3a8060', fontSize: 10 }}>datamau.json</code> cùng thư mục với file HTML này</span>
                </span>
              </button>

              {/* Xóa */}
              <button className="data-action-btn danger" onClick={handleClearStorage}>
                <span className="da-icon">🗑️</span>
                <span className="da-text">
                  <span className="da-title">Xóa bộ nhớ trình duyệt</span>
                  <span className="da-desc">Xóa toàn bộ dữ liệu localStorage của ứng dụng này</span>
                </span>
              </button>
            </div>

            <div className="data-panel-footer">
              Dữ liệu lưu trữ: gia phả · cài đặt hiển thị · nội dung giới thiệu
            </div>
          </div>
        </div>
      );
    }

    const DragCtx = React.createContext(null);

    function TreeNode({ node, onUpdate, onDelete, isRoot, showModal, dragMode, parentGen, showInfo, parentNode }) {
      const { dragState, setDragState, onDrop } = React.useContext(DragCtx);
      const settings = React.useContext(SettingsCtx);
      const [hover, setHover] = useState(false);
      const [dropZone, setDropZone] = useState(null);
      const lineRef = useRef(null);
      const hasKids = node.children?.length > 0;
      const desc = countDesc(node);
      const fs = settings.fontSize;
      const yearStr = (() => {
        if (node.birthYear && node.deathYear) return `(${node.birthYear}–${node.deathYear})`;
        if (node.birthYear) return `(${node.birthYear}– )`;
        if (node.deathYear) return `( –${node.deathYear})`;
        return "";
      })();
      const toggle = () => onUpdate(node.id, n => ({ ...n, collapsed: !n.collapsed }));
      const isDragging = dragState?.id === node.id;
      const isValidDropTarget = dragState && dragState.id !== node.id && !isAncestor(dragState.subtree, node.id, dragState.id);
      const handleDragStart = (e) => { e.stopPropagation(); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", node.id); setDragState({ id: node.id, subtree: node }); };
      const handleDragEnd = () => { setDragState(null); setDropZone(null); };
      const handleDragOver = (e) => {
        if (!isValidDropTarget) return; e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = "move";
        const rect = lineRef.current.getBoundingClientRect(); const ratio = (e.clientY - rect.top) / rect.height;
        if (isRoot) setDropZone('inside'); else if (ratio < 0.28) setDropZone('before'); else if (ratio > 0.72) setDropZone('after'); else setDropZone('inside');
      };
      const handleDragLeave = (e) => { if (!lineRef.current.contains(e.relatedTarget)) setDropZone(null); };
      const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); if (!isValidDropTarget || !dropZone) { setDropZone(null); return; } onDrop(dragState.id, node.id, dropZone); setDropZone(null); setDragState(null); };
      const lineClass = ["node-line", isDragging ? "dragging" : "", isValidDropTarget && dropZone === 'inside' ? "drag-over-inside" : "", isValidDropTarget && dropZone === 'before' ? "drag-over-before" : "", isValidDropTarget && dropZone === 'after' ? "drag-over-after" : ""].filter(Boolean).join(" ");
      return (
        <div>
          <div ref={lineRef} data-node-id={node.id} className={lineClass} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
            {dragMode && !isRoot ? <span className="drag-handle" draggable onDragStart={handleDragStart} onDragEnd={handleDragEnd} title="Kéo để di chuyển">⠿</span> : <span style={{ width: 16, flexShrink: 0 }} />}
            <button className="toggle-btn" onClick={hasKids ? toggle : undefined} disabled={!hasKids}>{hasKids ? (node.collapsed ? "+" : "−") : "·"}</button>
            <span style={{ fontFamily: "'Courier New', monospace", fontSize: fs, lineHeight: 1.7 }}>
              {node.isSpouse && <span style={{ color: settings.colorFemale, marginRight: 4, fontWeight: 700 }}>+</span>}
              <span
                style={{ color: node.gender === 'female' ? settings.colorFemale : settings.colorMale, fontWeight: 600, cursor: 'pointer', borderBottom: hover ? '1px dashed rgba(100,160,240,0.3)' : '1px solid transparent' }}
                onClick={e => { e.stopPropagation(); if (!dragMode) showInfo(node.isSpouse && parentNode ? { node, parentNode } : { node }); }}
                title="Click để xem chi tiết"
              >{node.name}</span>
              <span style={{ color: settings.colorGeneration, fontSize: fs * 0.87, marginLeft: 5 }}>(đời {node.generation})</span>
              {yearStr && <span style={{ color: settings.colorYears, fontSize: fs * 0.87, fontStyle: "italic", marginLeft: 4 }}>{yearStr}</span>}
              {node.deathAnniversary && <span style={{ color: settings.colorAnniversary, fontSize: fs * 0.83, marginLeft: 6 }}>✦ {node.deathAnniversary}</span>}
              {desc > 0 && !hover && <span style={{ color: "#1e3858", fontSize: fs * 0.82, marginLeft: 6 }}>({desc})</span>}
            </span>
            {isValidDropTarget && dropZone && <span style={{ marginLeft: 8, fontSize: 10, color: dropZone === 'inside' ? '#2a9060' : '#3a8890' }}>{dropZone === 'before' ? '↑ chèn trước' : dropZone === 'after' ? '↓ chèn sau' : '→ thêm vào'}</span>}
            {hover && !dragMode && (
              <span style={{ display: "flex", gap: 4, marginLeft: 6, flexShrink: 0 }}>
                <button onClick={() => showModal({ type: "add", nodeId: node.id, parentGen: node.generation, parentName: node.name })} style={{ fontSize: 11, padding: "1px 8px", background: "#081828", color: "#5090d0" }}>+ Thêm</button>
                <button onClick={() => showModal({ type: "edit", nodeId: node.id, node, parentGen: parentGen ?? node.generation })} style={{ fontSize: 11, padding: "1px 8px", background: "#10180a", color: "#70a840" }}>✎ Sửa</button>
                {!isRoot && <button onClick={() => { if (window.confirm(`Xóa "${node.name}"${hasKids ? ` và ${desc} con cháu` : ""}?`)) onDelete(node.id); }} style={{ fontSize: 11, padding: "1px 8px", background: "#180808", color: "#d05060" }}>✕ Xóa</button>}
              </span>
            )}
          </div>
          {!node.collapsed && hasKids && (
            <div className="children">{node.children.map(child =>
              child.isSpouse
                ? <div key={child.id} className="spouse-wrapper"><TreeNode node={child} onUpdate={onUpdate} onDelete={onDelete} isRoot={false} showModal={showModal} dragMode={dragMode} parentGen={node.generation} showInfo={showInfo} parentNode={node} /></div>
                : <TreeNode key={child.id} node={child} onUpdate={onUpdate} onDelete={onDelete} isRoot={false} showModal={showModal} dragMode={dragMode} parentGen={node.generation} showInfo={showInfo} />
            )}</div>
          )}
        </div>
      );
    }

    // ── Text Editor View ────────────────────────────────────────────────────────
    function TextEditor({ tree, onImport, onCancel }) {
      const [text, setText] = useState(() => treeToText(tree).join('\n'));
      const [status, setStatus] = useState(null); // null | {ok, msg}
      const [parsed, setParsed] = useState(null);

      const validate = (val) => {
        try {
          const t = textToTree(val);
          setParsed(t);
          setStatus({ ok: true, msg: `✓ Hợp lệ · ${countDesc(t) + 1} thành viên` });
        } catch (e) {
          setParsed(null);
          setStatus({ ok: false, msg: '✗ ' + e.message });
        }
      };

      useEffect(() => { validate(text); }, []);

      const handleChange = (e) => {
        setText(e.target.value);
        validate(e.target.value);
      };

      const handleApply = () => {
        if (parsed) onImport(parsed);
      };

      const handleCopy = () => {
        navigator.clipboard.writeText(text).then(() => setStatus({ ok: true, msg: '✓ Đã sao chép vào clipboard' }));
      };

      return (
        <div className="text-view">
          <div className="syntax-hint">
            <b>Cú pháp:</b> &nbsp;
            <code style={{color:'#3a7898'}}>Họ Tên (nữ) [năm sinh-năm mất] ✦ ngày giỗ §đời</code> &nbsp;·&nbsp;
            <code style={{color:'#2a6858'}}>+</code> = bạn đời &nbsp;·&nbsp;
            Thụt lề <b>6 dấu cách</b> (hoặc 1 Tab) = 1 cấp con &nbsp;·&nbsp;
            <code style={{color:'#507858'}}>✦</code> hoặc <code style={{color:'#507858'}}>~</code> = ngày giỗ
          </div>
          <div className="text-toolbar">
            <button onClick={handleApply} disabled={!parsed} style={{ background: parsed ? "#0e3020" : "#080f18", color: parsed ? "#50c878" : "#2a4a38", border: parsed ? "1px solid #1a6030" : "1px solid #0a2018", fontWeight: 600 }}>
              ✓ Áp dụng vào cây
            </button>
            <button onClick={handleCopy} style={{ fontSize: 12 }}>⎘ Sao chép</button>
            <button onClick={onCancel} style={{ fontSize: 12, color: "#4a6888", background: "transparent" }}>← Quay lại</button>
            {status && (
              <span className={status.ok ? "parse-ok" : "parse-error"}>{status.msg}</span>
            )}
          </div>
          <textarea
            className="text-editor"
            value={text}
            onChange={handleChange}
            spellCheck={false}
            placeholder={"Lê Đình Tục §6\n+ Bà cụ (nữ) §6\n      Lê Chân Kim [1950-2020] ✦ 5/8 âm lịch §7\n      + Vợ (nữ) §7\n            Lê Đình Đài §8"}
          />
        </div>
      );
    }

    // ── Nội Tộc Panel ───────────────────────────────────────────────────────────
    function buildNoiTocData(root) {
      // Collect all non-spouse members with ancestry info
      const byGen = {};
      // orderMap: gen → running index
      const orderMap = {};

      function walk(node, ancestors, fatherId, motherId) {
        if (node.isSpouse) return; // skip bạn đời

        const gen = node.generation;
        if (!byGen[gen]) byGen[gen] = [];
        if (!orderMap[gen]) orderMap[gen] = 0;
        orderMap[gen]++;

        // Spouses (dấu +)
        const spouses = (node.children || []).filter(c => c.isSpouse);
        const spouseCount = spouses.length;

        // Con ruột (không tính bạn đời): con trực tiếp + con qua bạn đời
        const directKids = (node.children || []).filter(c => !c.isSpouse);
        const kidsViaSpouse = spouses.flatMap(s => (s.children || []).filter(c => !c.isSpouse));
        const allKids = [...directKids, ...kidsViaSpouse];
        const childCount = allKids.length;

        // Cháu (con của con, không tính bạn đời)
        let grandCount = 0;
        for (const kid of allKids) {
          const kidDirectKids = (kid.children || []).filter(c => !c.isSpouse);
          const kidSpouses = (kid.children || []).filter(c => c.isSpouse);
          const kidKidsViaSpouse = kidSpouses.flatMap(s => (s.children || []).filter(c => !c.isSpouse));
          grandCount += kidDirectKids.length + kidKidsViaSpouse.length;
        }

        // 2 đời trước (ông cố và cha) — lưu tên + id để tô màu
        const ancestorList = ancestors.slice(-2);
        const ancestorNames = ancestorList.map(a => a.name);

        // groupKey = fatherId::motherId — cùng cha mẹ cùng nhóm màu
        const groupKey = fatherId !== null ? (fatherId + '::' + (motherId || '')) : null;

        byGen[gen].push({
          id: node.id,
          name: node.name,
          gender: node.gender,
          birthYear: node.birthYear,
          deathYear: node.deathYear,
          deathAnniversary: node.deathAnniversary,
          spouseCount,
          childCount,
          grandCount,
          ancestorNames,
          fatherId,
          motherId,
          groupKey,
          order: orderMap[gen],
        });

        const newAncestors = [...ancestors, { name: node.name, id: node.id }];
        // Walk con trực tiếp (non-spouse) của node — không biết mẹ
        for (const child of (node.children || []).filter(c => !c.isSpouse)) {
          walk(child, newAncestors, node.id, null);
        }
        // Walk con của từng bạn đời — biết cả cha lẫn mẹ
        for (const spouse of (node.children || []).filter(c => c.isSpouse)) {
          for (const sc of (spouse.children || []).filter(c => !c.isSpouse)) {
            walk(sc, newAncestors, node.id, spouse.id);
          }
        }
      }

      walk(root, [], null, null);
      return byGen;
    }

    function NoiTocPanel({ tree, onClose }) {
      const genData = React.useMemo(() => tree ? buildNoiTocData(tree) : {}, [tree]);
      const gens = Object.keys(genData).map(Number).sort((a, b) => a - b);
      const totalNội = gens.reduce((s, g) => s + genData[g].length, 0);
      const [collapsed, setCollapsed] = React.useState({});

      const toggleGen = (g) => setCollapsed(prev => ({ ...prev, [g]: !prev[g] }));
      const collapseAll = () => setCollapsed(Object.fromEntries(gens.map(g => [g, true])));
      const expandAll  = () => setCollapsed({});
      const allCollapsed = gens.every(g => collapsed[g]);

      // Chỉ hiện năm sinh/mất, không hiện ngày giỗ
      const fmtDate = (m) => {
        if (m.birthYear && m.deathYear) return `${m.birthYear}–${m.deathYear}`;
        if (m.birthYear) return `${m.birthYear}`;
        return '';
      };

      const spouseLabel = (gender, count) => {
        if (count === 0) return null;
        return gender === 'female' ? `${count} chồng` : `${count} vợ`;
      };

      // ── Tô màu đường dẫn cha/mẹ ──────────────────────────────────────────────
      // Palette: mỗi fatherId có 1 màu cha; mỗi groupKey (cha+mẹ) có 1 màu riêng
      // Màu cùng cha cùng mẹ: sắc sáng; cùng cha khác mẹ: sắc nhạt hơn
      const FATHER_HUES = [210, 160, 40, 280, 15, 340, 90, 190, 250, 310, 70, 130];
      const ancestorColorMap = React.useMemo(() => {
        // Gom tất cả member trong tất cả đời
        const allMembers = gens.flatMap(g => genData[g]);
        // Gán hue cho từng fatherId theo thứ tự xuất hiện
        const fatherHue = {};
        let fatherIdx = 0;
        // Gom groupKeys theo từng fatherId
        const groupsByFather = {};
        for (const m of allMembers) {
          if (!m.fatherId) continue;
          if (!(m.fatherId in fatherHue)) {
            fatherHue[m.fatherId] = FATHER_HUES[fatherIdx % FATHER_HUES.length];
            fatherIdx++;
          }
          if (!groupsByFather[m.fatherId]) groupsByFather[m.fatherId] = new Set();
          groupsByFather[m.fatherId].add(m.groupKey);
        }
        // Gán màu cho từng groupKey
        const colorMap = {}; // groupKey → { textColor, borderColor, label }
        for (const [fid, hue] of Object.entries(fatherHue)) {
          const groups = [...groupsByFather[fid]];
          groups.forEach((gk, i) => {
            const hasMultiMother = groups.length > 1;
            if (!hasMultiMother) {
              // Chỉ 1 mẹ: màu đồng nhất
              colorMap[gk] = {
                color: `hsl(${hue}, 60%, 62%)`,
                border: `hsl(${hue}, 40%, 30%)`,
              };
            } else {
              // Nhiều mẹ: cùng hue cha, lightness khác nhau để phân biệt mẹ
              const lightness = 68 - i * 16; // 68, 52, 36...
              const saturation = 65 - i * 10;
              colorMap[gk] = {
                color: `hsl(${hue}, ${Math.max(saturation,30)}%, ${Math.max(lightness,38)}%)`,
                border: `hsl(${hue}, 35%, 28%)`,
              };
            }
          });
        }
        return colorMap;
      }, [genData, gens]);

      return (
        <div className="noitoc-overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="noitoc-panel" onMouseDown={e => e.stopPropagation()}>
            <div className="noitoc-header">
              <span style={{ fontSize: 20 }}>👨‍👩‍👧‍👦</span>
              <span className="noitoc-title">Nội tộc</span>
              <span className="noitoc-badge">{totalNội} người</span>
              <button
                onClick={allCollapsed ? expandAll : collapseAll}
                title={allCollapsed ? "Mở rộng tất cả" : "Thu nhỏ tất cả"}
                style={{ fontSize: 14, padding: "3px 9px", background: "#081828", color: "#4a7aaa", border: "1px solid #1a3a58", marginLeft: 4 }}
              >{allCollapsed ? "⊞" : "⊟"}</button>
              <button className="modal-close" onClick={onClose} style={{ marginLeft: 4 }}>×</button>
            </div>

            <div className="noitoc-body">
              {gens.map(g => {
                const members = genData[g];
                const isCollapsed = collapsed[g];
                return (
                  <div key={g}>
                    <div className="noitoc-gen-header" onClick={() => toggleGen(g)}>
                      <span className="noitoc-gen-toggle">{isCollapsed ? '▶' : '▼'}</span>
                      <span className="noitoc-gen-label">Đời {g}</span>
                      <span className="noitoc-gen-count">({members.length} thành viên)</span>
                    </div>
                    {!isCollapsed && members.map((m) => {
                      const date = fmtDate(m);
                      const orderLabel = `${g}.${m.order}.`;
                      const sl = spouseLabel(m.gender, m.spouseCount);
                      return (
                        <div key={m.id} className="noitoc-member">
                          <div className="noitoc-member-row1">
                            <span className="noitoc-order">{orderLabel}</span>
                            <span className="noitoc-name" style={{ color: m.gender === 'female' ? '#f080a0' : '#6aaaf0' }}>{m.name}</span>
                            {date && <span className="noitoc-date">{date}</span>}
                            <div className="noitoc-stats">
                              {sl && <span className="noitoc-tag noitoc-tag-spouse">{sl}</span>}
                              {m.childCount > 0 && <span className="noitoc-tag noitoc-tag-child">{m.childCount} con</span>}
                              {m.grandCount > 0 && <span className="noitoc-tag noitoc-tag-grand">{m.grandCount} cháu</span>}
                            </div>
                          </div>
                          {m.ancestorNames.length > 0 && (() => {
                            const col = m.groupKey && ancestorColorMap[m.groupKey];
                            return (
                              <div
                                className="noitoc-ancestors"
                                style={col ? {
                                  color: col.color,
                                  borderLeft: `3px solid ${col.border}`,
                                  paddingLeft: 8,
                                  marginLeft: 36,
                                  borderRadius: 2,
                                  fontStyle: 'italic',
                                } : {}}
                              >
                                {m.ancestorNames.join(' / ')}
                              </div>
                            );
                          })()}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Node Info Popup ──────────────────────────────────────────────────────────
    function NodeInfoPopup({ node, parentNode, onClose, onEdit, onAdd }) {
      const settings = React.useContext(SettingsCtx);

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // Nếu node là bạn đời (isSpouse), hiện từ góc nhìn của cặp đôi:
      // - parentNode là người chồng/vợ chính
      // - node hiện tại là bạn đời
      // Lấy tất cả bạn đời của parentNode (để hiện "bạn đời khác" nếu có)
      // và con cái từ node bạn đời hiện tại
      const isSpouseView = !!(node.isSpouse && parentNode);

      // Dữ liệu khi click vào NODE CHÍNH (không phải bạn đời)
      const spouses = (node.children || []).filter(c => c.isSpouse);
      const directChildren = (node.children || []).filter(c => !c.isSpouse);
      const spouseGroups = spouses.map(s => ({ spouse: s, children: (s.children || []).filter(c => !c.isSpouse) }));
      const totalChildren = directChildren.length + spouseGroups.reduce((a, g) => a + g.children.length, 0);

      // Dữ liệu khi click vào NODE BẠN ĐỜI — hiện từ góc nhìn cặp đôi
      // parentNode = người chính, node = bạn đời được click
      const partnerSpouses = isSpouseView ? (parentNode.children || []).filter(c => c.isSpouse) : [];
      const partnerChildren = isSpouseView ? (node.children || []).filter(c => !c.isSpouse) : [];
      const partnerDirectChildren = isSpouseView ? (parentNode.children || []).filter(c => !c.isSpouse) : [];

      const yearStr = (n) => {
        if (n.birthYear && n.deathYear) return `${n.birthYear}–${n.deathYear}`;
        if (n.birthYear) return `sinh ${n.birthYear}`;
        if (n.deathYear) return `mất ${n.deathYear}`;
        return '';
      };

      const myYears = yearStr(node);
      const myColor = node.gender === 'female' ? settings.colorFemale : settings.colorMale;
      const avatar = node.isSpouse ? '⚭' : (node.gender === 'female' ? '♀' : '♂');
      const avatarBg = node.gender === 'female' ? 'rgba(240,128,160,0.12)' : 'rgba(106,172,240,0.12)';

      const MemberRow = ({ m, isSpouseRow, spouseIndex }) => {
        const col = m.gender === 'female' ? settings.colorFemale : settings.colorMale;
        const ys = yearStr(m);
        const rowStyle = isSpouseRow
          ? { background: 'rgba(240,128,160,0.07)', border: '1px solid rgba(240,128,160,0.18)' }
          : {};
        return (
          <div className="info-member-row" style={rowStyle}>
            <span style={{ color: col, fontSize: 15, flexShrink: 0 }}>
              {m.isSpouse ? '⚭' : (m.gender === 'female' ? '♀' : '♂')}
            </span>
            <span className="info-member-name" style={{ color: col }}>
              {isSpouseRow && spouseIndex && <span style={{ color: '#3a5878', fontSize: 10, marginRight: 5, fontWeight: 400 }}>Vợ/chồng {spouseIndex}:</span>}
              {m.name}
            </span>
            {ys && <span className="info-member-years">{ys}</span>}
            {m.deathAnniversary && <span className="info-member-ann">✦ {m.deathAnniversary}</span>}
            <span style={{ fontSize: 10, color: '#1e3858', flexShrink: 0 }}>đời {m.generation}</span>
          </div>
        );
      };

      return (
        <div className="info-popup-overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="info-popup">

            {/* ── TRƯỜNG HỢP: click vào BẠN ĐỜI → hiện cặp đôi ── */}
            {isSpouseView ? (<>
              {/* Header: hiện cả 2 người trong cặp */}

    // ── Search Modal Component ───────────────────────────────────────────────────
    function SearchModal({ tree, onClose, onNavigate }) {
      const [query, setQuery] = useState('');
      const [activeIdx, setActiveIdx] = useState(0);
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const results = React.useMemo(() => {
        if (!query.trim() || !tree) return [];
        const q = query.trim().toLowerCase();
        return collectAllNodes(tree).filter(n =>
          n.name.toLowerCase().includes(q)
        ).slice(0, 50);
      }, [query, tree]);

      useEffect(() => { setActiveIdx(0); }, [results]);

      const handleKey = (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, results.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter') { if (results[activeIdx]) onNavigate(results[activeIdx].id); }
        else if (e.key === 'Escape') { onClose(); }
      };

      return (
        <div className="search-modal" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="search-box">
            <div className="search-input-wrap">
              <span className="search-icon">🔍</span>
              <input
                ref={inputRef}
                value={query}
                onChange={e => setQuery(e.target.value)}
                onKeyDown={handleKey}
                placeholder="Tìm kiếm thành viên theo tên..."
              />
              {query && <button onClick={() => setQuery('')} style={{ background: 'none', border: 'none', color: '#2a4a68', fontSize: 18, padding: '0 4px', lineHeight: 1 }}>×</button>}
            </div>

            <div className="search-results">
              {!query.trim() && (
                <div className="search-empty">Nhập tên để tìm kiếm thành viên trong gia phả</div>
              )}
              {query.trim() && results.length === 0 && (
                <div className="search-empty">Không tìm thấy thành viên nào khớp với "<b style={{color:'#4a7aaa'}}>{query}</b>"</div>
              )}
              {results.map((node, i) => {
                const yearStr = (() => {
                  if (node.birthYear && node.deathYear) return `${node.birthYear}–${node.deathYear}`;
                  if (node.birthYear) return `sinh ${node.birthYear}`;
                  if (node.deathYear) return `mất ${node.deathYear}`;
                  return '';
                })();
                const meta = [yearStr, node.deathAnniversary ? `✦ ${node.deathAnniversary}` : ''].filter(Boolean).join('  ');
                return (
                  <div
                    key={node.id}
                    className={"search-result-item" + (i === activeIdx ? " active" : "")}
                    onClick={() => onNavigate(node.id)}
                    onMouseEnter={() => setActiveIdx(i)}
                  >
                    <span style={{ color: node.gender === 'female' ? '#f080a0' : '#6aacf0', fontSize: 16, flexShrink: 0 }}>
                      {node.isSpouse ? '⚭' : (node.gender === 'female' ? '♀' : '♂')}
                    </span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="search-result-name" style={{ color: node.gender === 'female' ? '#f080a0' : '#6aacf0' }}>
                        {node.isSpouse && <span style={{ color: '#f080a0', marginRight: 4 }}>+</span>}
                        {highlightMatch(node.name, query)}
                      </div>
                      {meta && <div className="search-result-meta">{meta}</div>}
                    </div>
                    <span className="search-result-gen">Đời {node.generation}</span>
                  </div>
                );
              })}
            </div>

            <div className="search-footer">
              <span>↑↓ Điều hướng</span>
              <span>↵ Chọn</span>
              <span>Esc Đóng</span>
              {results.length > 0 && <span style={{ marginLeft: 'auto', color: '#2a5878' }}>{results.length} kết quả</span>}
            </div>
          </div>
        </div>
      );
    }

    // ── Ngày Giỗ Popup ───────────────────────────────────────────────────────────
    function NgayGioPopup({ tree, onClose }) {
      React.useEffect(() => {
        const h = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [onClose]);

      // Thu thập tất cả node có deathAnniversary
      const items = React.useMemo(() => {
        if (!tree) return [];
        const list = [];
        function walk(node) {
          // Cả nội tộc lẫn bạn đời đều có thể có ngày giỗ
          if (node.deathAnniversary && node.deathAnniversary.trim()) {
            const raw = node.deathAnniversary.trim();
            // Parse dd/mm hoặc d/m
            const m = raw.match(/^(\d{1,2})[\/\-\.](\d{1,2})/);
            if (m) {
              const day = parseInt(m[1], 10);
              const month = parseInt(m[2], 10);
              list.push({ ...node, parsedDay: day, parsedMonth: month, rawDate: raw });
            }
          }
          for (const c of node.children || []) walk(c);
        }
        walk(tree);
        // Sắp xếp tăng dần theo tháng → ngày
        list.sort((a, b) => a.parsedMonth !== b.parsedMonth ? a.parsedMonth - b.parsedMonth : a.parsedDay - b.parsedDay);
        return list;
      }, [tree]);

      const MONTHS_VI = ['Tháng Giêng','Tháng Hai','Tháng Ba','Tháng Tư','Tháng Năm','Tháng Sáu','Tháng Bảy','Tháng Tám','Tháng Chín','Tháng Mười','Tháng Mười Một','Tháng Chạp'];

      // Nhóm theo tháng
      const grouped = React.useMemo(() => {
        const map = {};
        for (const item of items) {
          if (!map[item.parsedMonth]) map[item.parsedMonth] = [];
          map[item.parsedMonth].push(item);
        }
        return map;
      }, [items]);

      const months = Object.keys(grouped).map(Number).sort((a,b) => a-b);

      return (
        <div className="giodio-overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="giodio-panel">
            <div className="giodio-header">
              <span style={{ fontSize: 26 }}>🕯️</span>
              <span className="giodio-title">Ngày Giỗ</span>
              <span className="giodio-badge">{items.length} người</span>
              <button className="modal-close" onClick={onClose} style={{ fontSize: 22 }}>×</button>
            </div>

            <div className="giodio-body">
              {items.length === 0 && (
                <div className="giodio-empty">Chưa có thông tin ngày giỗ nào được ghi lại</div>
              )}
              {months.map(mo => (
                <div key={mo}>
                  <div className="giodio-month-header">
                    ☽ {MONTHS_VI[mo - 1]} (Âm lịch)
                  </div>
                  {grouped[mo].map(item => {
                    const nameColor = item.isSpouse
                      ? (item.gender === 'female' ? '#f090b8' : '#80b8f0')
                      : (item.gender === 'female' ? '#f080a0' : '#6aaaf0');
                    const years = item.birthYear && item.deathYear
                      ? `${item.birthYear} – ${item.deathYear}`
                      : item.deathYear ? `Mất ${item.deathYear}`
                      : item.birthYear ? `Sinh ${item.birthYear}` : '';
                    return (
                      <div key={item.id} className="giodio-item">
                        <div style={{ textAlign: 'center', flexShrink: 0, minWidth: 52 }}>
                          <div className="giodio-day">{String(item.parsedDay).padStart(2,'0')}</div>
                          <div className="giodio-day-label">tháng {item.parsedMonth}</div>
                        </div>
                        <div className="giodio-divider" />
                        <div className="giodio-info">
                          <div className="giodio-name" style={{ color: nameColor }}>
                            {item.isSpouse && <span style={{ color: '#c070a0', marginRight: 6, fontWeight: 400, fontSize: 15 }}>⚭</span>}
                            {item.name}
                          </div>
                          <div className="giodio-meta">
                            {years && <span style={{ fontStyle: 'italic', color: '#4a7898' }}>{years}</span>}
                            <span style={{ color: '#3a6888' }}>✦ {item.rawDate} âm lịch</span>
                          </div>
                        </div>
                        <div className="giodio-gen">Đời {item.generation}</div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── ExpandMenu Component ────────────────────────────────────────────────────
    function ExpandMenu({ tree, transformAll }) {
      const [open, setOpen] = React.useState(false);
      const [activeGen, setActiveGen] = React.useState(null); // null = tất cả
      const ref = React.useRef(null);

      // Tính đời tối đa trong cây
      const maxGen = React.useMemo(() => {
        if (!tree) return 1;
        function maxDepth(n) { return Math.max(n.generation, ...(n.children || []).map(maxDepth)); }
        return maxDepth(tree);
      }, [tree]);

      // Đời có thể chọn: 1 → maxGen-1
      const genOptions = [];
      for (let g = 1; g <= maxGen - 1; g++) genOptions.push(g);

      // Close on outside click
      React.useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [open]);

      const applyExpand = (upToGen) => {
        setActiveGen(upToGen);
        setOpen(false);
        if (upToGen === null) {
          // Mở rộng tất cả
          transformAll(n => ({ ...n, collapsed: false }));
        } else {
          // Mở rộng đến đời upToGen, thu gọn các đời sau
          transformAll(n => ({ ...n, collapsed: n.generation >= upToGen }));
        }
      };

      const label = activeGen === null ? 'Mở rộng ▾' : `Mở rộng đến đời ${activeGen} ▾`;

      return (
        <div className="expand-menu-wrap" ref={ref}>
          <button
            onClick={() => setOpen(v => !v)}
            style={{ fontSize: 12, background: open ? '#0e2040' : '#0a1e38', color: '#5a9ad8', border: '1px solid #1a3a60' }}
          >{label}</button>
          {open && (
            <div className="expand-dropdown">
              <div
                className={"expand-dropdown-item" + (activeGen === null ? " active" : "")}
                onClick={() => applyExpand(null)}
              >Tất cả</div>
              <div className="expand-dropdown-sep" />
              {genOptions.map(g => (
                <div
                  key={g}
                  className={"expand-dropdown-item" + (activeGen === g ? " active" : "")}
                  onClick={() => applyExpand(g)}
                >Đến đời {g}</div>
              ))}
            </div>
          )}
        </div>
      );
    }
